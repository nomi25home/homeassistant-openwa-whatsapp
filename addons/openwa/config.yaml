name: "OpenWA WhatsApp API"
version: "1.0.0"
slug: "openwa-whatsapp"
description: "A high-performance WhatsApp API server. Use this in conjunction with the OpenWA WhatsApp integration to send messages from Home Assistant."
arch:
  - aarch64
  - armhf
  - armv7
  - x86_64
ports:
  2785/tcp: 2785
options:
  api_master_key:
    description: "OpenWA Master API Key"
    type: string
    default: "change_me_to_a_secure_key"
  log_level:
    description: "Log Level"
    type: select
    options:
      - "info"
      - "debug"
      - "warn"
      - "error"
    default: "info"
  engine_type:
    description: "Engine Type"
    type: select
    options:
      - "whatsapp-web.js"
    default: "whatsapp-web.js"
